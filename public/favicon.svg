<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c7cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0d0d14"/>
  <!-- Central node -->
  <circle cx="16" cy="16" r="3" fill="url(#g)"/>
  <!-- Satellite nodes -->
  <circle cx="7" cy="9" r="2" fill="url(#g)" opacity="0.85"/>
  <circle cx="25" cy="9" r="2" fill="url(#g)" opacity="0.85"/>
  <circle cx="7" cy="23" r="2" fill="url(#g)" opacity="0.85"/>
  <circle cx="25" cy="23" r="2" fill="url(#g)" opacity="0.85"/>
  <!-- Connecting lines -->
  <line x1="16" y1="16" x2="7" y2="9" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="25" y2="9" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="7" y2="23" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="25" y2="23" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
</svg>
